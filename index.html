<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>Sound Scissors</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --border-radius: 12px;
            --color-bg: #ffffff;
            --color-text: #1d1d1f;
            --color-border: #d2d2d7;
            --color-accent: #0071e3;
            --color-accent-light: #a0cfff;
            --color-danger: #ff3b30;
            --color-muted: #86868b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: env(safe-area-inset-top) var(--spacing-md) env(safe-area-inset-bottom);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
        }

        /* Title section with decorative lines */
        .title-section {
            margin: var(--spacing-lg) 0 var(--spacing-xl);
        }

        .title-line {
            height: 1px;
            background: var(--color-border);
            width: 100%;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin: var(--spacing-md) 0;
        }

        .title-row svg {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .title-row h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-muted);
            margin-bottom: var(--spacing-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Custom file input using Add File SVG */
        .file-input-wrapper {
            margin-bottom: var(--spacing-lg);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .file-select-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            width: 100%;
            padding: var(--spacing-md);
            border: 2px dashed var(--color-border);
            border-radius: var(--border-radius);
            background: #fafafa;
            cursor: pointer;
            font-size: 16px;
            color: var(--color-text);
            transition: border-color 0.2s;
        }

        .file-select-btn:active {
            border-color: var(--color-accent);
        }

        .file-select-btn svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .file-name-display {
            margin-top: var(--spacing-sm);
            font-size: 14px;
            color: var(--color-muted);
            text-align: center;
            min-height: 21px;
        }

        .clear-file-btn {
            display: none;
            width: 100%;
            margin-top: var(--spacing-sm);
            padding: 10px;
            border: 1px solid var(--color-danger);
            background: transparent;
            color: var(--color-danger);
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .clear-file-btn.visible {
            display: block;
        }

        .section-count-wrapper {
            margin-bottom: var(--spacing-lg);
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-size: 17px;
            appearance: none;
            -webkit-appearance: none;
        }

        .sections-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .section-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 40px;
            gap: var(--spacing-sm);
            align-items: center;
            padding: var(--spacing-md);
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--color-border);
        }

        .section-label {
            font-weight: 700;
            font-size: 15px;
            color: var(--color-accent);
        }

        .time-input-group {
            display: flex;
            flex-direction: column;
        }

        .time-input-group label {
            font-size: 10px;
            margin-bottom: 4px;
        }

        .remove-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--color-danger);
            color: white;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }

        .remove-btn:disabled {
            background: var(--color-border);
            cursor: not-allowed;
        }

        /* Save button with white floppy disk and lighter disabled state */
        button.primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            width: 100%;
            padding: var(--spacing-md);
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: var(--spacing-sm);
            transition: background 0.2s;
        }

        button.primary:disabled {
            background: var(--color-accent-light);
            cursor: not-allowed;
        }

        button.primary svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .status {
            margin-top: var(--spacing-md);
            font-size: 14px;
            text-align: center;
            min-height: 21px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

        const fileInput = document.getElementById('audioFile');
        const clearFileBtn = document.getElementById('clearFileBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const sectionCountInput = document.getElementById('sectionCount');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const processBtn = document.getElementById('processBtn');
        const statusEl = document.getElementById('status');

        let audioContext = null;
        let sourceBuffer = null;
        let buttonSoundBuffer = null;

        // Initialize Web Audio API and decode button sound on first user interaction
        async function initAudioAndPlay() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                if (!buttonSoundBuffer) {
                    const binaryStr = atob(BUTTON_SOUND_B64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    buttonSoundBuffer = await audioContext.decodeAudioData(bytes.buffer);
                }
                const source = audioContext.createBufferSource();
                source.buffer = buttonSoundBuffer;
                source.connect(audioContext.destination);
                source.start(0);
            } catch (e) {
                console.warn('Button sound failed:', e);
            }
        }

        // Attach sound to all interactive elements via event delegation
        document.addEventListener('click', (e) => {
            const interactive = e.target.closest('button, label.file-select-btn, .remove-btn');
            if (interactive) {
                initAudioAndPlay();
            }
        });

        function renderSections(count) {
    sectionsContainer.innerHTML = '';
    const safeCount = Math.max(1, Math.min(20, parseInt(count) || 1));
    
    for (let i = 0; i < safeCount; i++) {
        const row = document.createElement('div');
        row.className = 'section-row';
        row.innerHTML = `
            <span class="section-label">${i + 1}</span>
            <div class="time-input-group">
                <label>Start</label>
                <div style="display:flex;gap:4px;align-items:center;">
                    <input type="number" step="1" min="0" placeholder="0" class="start-min" inputmode="numeric" style="width:40%;">
                    <span style="font-size:12px;">m</span>
                    <input type="number" step="1" min="0" max="59" placeholder="0" class="start-sec" inputmode="numeric" style="width:40%;">
                    <span style="font-size:12px;">s</span>
                </div>
            </div>
            <div class="time-input-group">
                <label>End</label>
                <div style="display:flex;gap:4px;align-items:center;">
                    <input type="number" step="1" min="0" placeholder="0" class="end-min" inputmode="numeric" style="width:40%;">
                    <span style="font-size:12px;">m</span>
                    <input type="number" step="1" min="0" max="59" placeholder="0" class="end-sec" inputmode="numeric" style="width:40%;">
                    <span style="font-size:12px;">s</span>
                </div>
            </div>
            <button class="remove-btn" aria-label="Remove section" ${safeCount <= 1 ? 'disabled' : ''}>×</button>
        `;
        
        row.querySelector('.remove-btn').addEventListener('click', () => {
            if (sectionsContainer.children.length > 1) {
                row.remove();
                sectionCountInput.value = sectionsContainer.children.length;
                updateRemoveButtons();
            }
        });
        
        sectionsContainer.appendChild(row);
    }
    updateRemoveButtons();
}
        function updateRemoveButtons() {
            const btns = sectionsContainer.querySelectorAll('.remove-btn');
            btns.forEach(btn => btn.disabled = sectionsContainer.children.length <= 1);
        }

        function resetAppState() {
            sourceBuffer = null;
            fileInput.value = '';
            clearFileBtn.classList.remove('visible');
            fileNameDisplay.textContent = '';
            processBtn.disabled = true;
            statusEl.textContent = '';
        }

        clearFileBtn.addEventListener('click', resetAppState);

        sectionCountInput.addEventListener('change', () => renderSections(sectionCountInput.value));
        renderSections(1);

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) {
                resetAppState();
                return;
            }

            clearFileBtn.classList.add('visible');
            fileNameDisplay.textContent = file.name;
            statusEl.textContent = 'Loading audio...';
            processBtn.disabled = true;

            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await file.arrayBuffer();
                sourceBuffer = await audioContext.decodeAudioData(arrayBuffer);
                statusEl.textContent = `Loaded (${sourceBuffer.duration.toFixed(2)}s)`;
                processBtn.disabled = false;
            } catch (err) {
                statusEl.textContent = 'Error loading audio file.';
                console.error(err);
                resetAppState();
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!sourceBuffer) return;

            const rows = sectionsContainer.querySelectorAll('.section-row');
            statusEl.textContent = 'Processing sections...';
            processBtn.disabled = true;

            for (let i = 0; i < rows.length; i++) {
                const startMin = parseFloat(rows[i].querySelector('.start-min').value) || 0;
const startSec = parseFloat(rows[i].querySelector('.start-sec').value) || 0;
const endMin = parseFloat(rows[i].querySelector('.end-min').value) || 0;
const endSec = parseFloat(rows[i].querySelector('.end-sec').value) || 0;

const start = (startMin * 60) + startSec;
const end = (endMin * 60) + endSec;
                
                if (end <= start) {
                    statusEl.textContent = `Section ${i + 1}: End must be after start.`;
                    processBtn.disabled = false;
                    return;
                }

                const startSample = Math.floor(start * sourceBuffer.sampleRate);
                const endSample = Math.floor(Math.min(end, sourceBuffer.duration) * sourceBuffer.sampleRate);
                const frameCount = endSample - startSample;

                const newBuffer = audioContext.createBuffer(
                    sourceBuffer.numberOfChannels,
                    frameCount,
                    sourceBuffer.sampleRate
                );

                for (let ch = 0; ch < sourceBuffer.numberOfChannels; ch++) {
                    const sourceData = sourceBuffer.getChannelData(ch);
                    const newData = newBuffer.getChannelData(ch);
                    for (let s = 0; s < frameCount; s++) {
                        newData[s] = sourceData[startSample + s];
                    }
                }

                const wavBlob = bufferToWav(newBuffer);
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `section_${i + 1}_${start.toFixed(2)}s-${end.toFixed(2)}s.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                await new Promise(r => setTimeout(r, 500));
            }

            statusEl.textContent = 'All sections saved.';
            processBtn.disabled = false;
        });

        function bufferToWav(buffer) {
            const numCh = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1;
            const bitsPerSample = 16;
            const bytesPerSample = bitsPerSample / 8;
            const blockAlign = numCh * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = buffer.length * blockAlign;
            const headerSize = 44;
            const arrayBuffer = new ArrayBuffer(headerSize + dataSize);
            const view = new DataView(arrayBuffer);

            function writeString(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numCh, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let ch = 0; ch < numCh; ch++) {
                    const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                    offset += 2;
                }
            }

            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
