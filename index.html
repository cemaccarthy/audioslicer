<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>Sound Scissors</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --border-radius: 12px;
            --color-bg: #ffffff;
            --color-text: #1d1d1f;
            --color-border: #d2d2d7;
            --color-accent: #0071e3;
            --color-danger: #ff3b30;
            --color-muted: #86868b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: env(safe-area-inset-top) var(--spacing-md) env(safe-area-inset-bottom);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
        }

        /* Title row with scissors */
        .title-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin: var(--spacing-lg) 0 var(--spacing-md);
        }

        .title-row svg {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .title-row h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-muted);
            margin-bottom: var(--spacing-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Custom file input using Add File SVG */
        .file-input-wrapper {
            margin-bottom: var(--spacing-lg);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .file-select-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            width: 100%;
            padding: var(--spacing-md);
            border: 2px dashed var(--color-border);
            border-radius: var(--border-radius);
            background: #fafafa;
            cursor: pointer;
            font-size: 16px;
            color: var(--color-text);
            transition: border-color 0.2s;
        }

        .file-select-btn:active {
            border-color: var(--color-accent);
        }

        .file-select-btn svg {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .file-name-display {
            margin-top: var(--spacing-sm);
            font-size: 14px;
            color: var(--color-muted);
            text-align: center;
            min-height: 21px;
        }

        .clear-file-btn {
            display: none;
            width: 100%;
            margin-top: var(--spacing-sm);
            padding: 10px;
            border: 1px solid var(--color-danger);
            background: transparent;
            color: var(--color-danger);
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .clear-file-btn.visible {
            display: block;
        }

        .section-count-wrapper {
            margin-bottom: var(--spacing-lg);
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-size: 17px;
            appearance: none;
            -webkit-appearance: none;
        }

        .sections-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .section-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 40px;
            gap: var(--spacing-sm);
            align-items: center;
            padding: var(--spacing-md);
            background: #fafafa;
            border-radius: var(--border-radius);
            border: 1px solid var(--color-border);
        }

        .section-label {
            font-weight: 700;
            font-size: 15px;
            color: var(--color-accent);
        }

        .time-input-group {
            display: flex;
            flex-direction: column;
        }

        .time-input-group label {
            font-size: 10px;
            margin-bottom: 4px;
        }

        .remove-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--color-danger);
            color: white;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }

        .remove-btn:disabled {
            background: var(--color-border);
            cursor: not-allowed;
        }

        /* Save button with white floppy disk */
        button.primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            width: 100%;
            padding: var(--spacing-md);
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: var(--spacing-sm);
        }

        button.primary:disabled {
            background: var(--color-border);
        }

        button.primary svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .status {
            margin-top: var(--spacing-md);
            font-size: 14px;
            text-align: center;
            min-height: 21px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

        <h1>Sound Scissors</h1>
    </div>

    <!-- File input with Add File SVG button -->
    <label for="audioFile">Source Audio File</label>
    <div class="file-input-wrapper">
        <input type="file" id="audioFile" accept=".mp3,.wav,.aiff,.flac,.m4a,.aac">
        <label for="audioFile" class="file-select-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7,10h6M10,7v6" style="fill:none;stroke:#2ca9bc;stroke-linecap:round;stroke-linejoin:round;stroke-width:2"/>
                <path d="M7,21H17a4,4,0,0,0,4-4V5" style="fill:none;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:2"/>
                <rect x="3" y="3" width="14" height="14" rx="1" style="fill:none;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:2"/>
            </svg>
            <span>Select Audio File</span>
        </label>
        <div id="fileNameDisplay" class="file-name-display"></div>
        <button id="clearFileBtn" class="clear-file-btn">Clear File</button>
    </div>

    <div class="section-count-wrapper">
        <label for="sectionCount">Number of Sections</label>
        <input type="number" id="sectionCount" min="1" max="20" value="1" inputmode="numeric">
    </div>

    <div id="sectionsContainer" class="sections-container"></div>

    <!-- Save button with white floppy disk SVG -->
    <button id="processBtn" class="primary" disabled>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path opacity="0.3" fill-rule="evenodd" clip-rule="evenodd" d="M5.75 3.00924C4.66395 3.03684 4.02467 3.14691 3.58579 3.58579C3 4.17157 3 5.11438 3 7V17C3 18.8856 3 19.8284 3.58579 20.4142C4.17157 21 5.11438 21 7 21H17C18.8856 21 19.8284 21 20.4142 20.4142C21 19.8284 21 18.8856 21 17L21 9.95634C21 8.99563 21 8.51528 20.7966 8.09946C20.5933 7.68365 20.2141 7.38874 19.4558 6.79893L15.6548 3.84259C15.1181 3.4252 14.8498 3.21651 14.5343 3.10825C14.2268 3.00274 13.8961 3.00007 13.25 3V6C13.25 7.24264 12.2426 8.25 11 8.25H8C6.75736 8.25 5.75 7.24264 5.75 6V3.00924ZM8.75 15C8.75 13.2051 10.2051 11.75 12 11.75C13.7949 11.75 15.25 13.2051 15.25 15C15.25 16.7949 13.7949 18.25 12 18.25C10.2051 18.25 8.75 16.7949 8.75 15Z" fill="white"/>

        </svg>
        Save Sections
    </button>
    <div id="status" class="status"></div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const clearFileBtn = document.getElementById('clearFileBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const sectionCountInput = document.getElementById('sectionCount');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const processBtn = document.getElementById('processBtn');
        const statusEl = document.getElementById('status');

        let audioContext = null;
        let sourceBuffer = null;

        function renderSections(count) {
            sectionsContainer.innerHTML = '';
            const safeCount = Math.max(1, Math.min(20, parseInt(count) || 1));
            
            for (let i = 0; i < safeCount; i++) {
                const row = document.createElement('div');
                row.className = 'section-row';
                row.innerHTML = `
                    <span class="section-label">${i + 1}</span>
                    <div class="time-input-group">
                        <label>Start (sec)</label>
                        <input type="number" step="0.01" min="0" placeholder="0.00" class="start-time" inputmode="decimal">
                    </div>
                    <div class="time-input-group">
                        <label>End (sec)</label>
                        <input type="number" step="0.01" min="0" placeholder="0.00" class="end-time" inputmode="decimal">
                    </div>
                    <button class="remove-btn" aria-label="Remove section" ${safeCount <= 1 ? 'disabled' : ''}>×</button>
                `;
                
                row.querySelector('.remove-btn').addEventListener('click', () => {
                    if (sectionsContainer.children.length > 1) {
                        row.remove();
                        sectionCountInput.value = sectionsContainer.children.length;
                        updateRemoveButtons();
                    }
                });
                
                sectionsContainer.appendChild(row);
            }
            updateRemoveButtons();
        }

        function updateRemoveButtons() {
            const btns = sectionsContainer.querySelectorAll('.remove-btn');
            btns.forEach(btn => btn.disabled = sectionsContainer.children.length <= 1);
        }

        function resetAppState() {
            sourceBuffer = null;
            fileInput.value = '';
            clearFileBtn.classList.remove('visible');
            fileNameDisplay.textContent = '';
            processBtn.disabled = true;
            statusEl.textContent = '';
        }

        clearFileBtn.addEventListener('click', resetAppState);

        sectionCountInput.addEventListener('change', () => renderSections(sectionCountInput.value));
        renderSections(1);

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) {
                resetAppState();
                return;
            }

            clearFileBtn.classList.add('visible');
            fileNameDisplay.textContent = file.name;
            statusEl.textContent = 'Loading audio...';
            processBtn.disabled = true;

            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await file.arrayBuffer();
                sourceBuffer = await audioContext.decodeAudioData(arrayBuffer);
                statusEl.textContent = `Loaded (${sourceBuffer.duration.toFixed(2)}s)`;
                processBtn.disabled = false;
            } catch (err) {
                statusEl.textContent = 'Error loading audio file.';
                console.error(err);
                resetAppState();
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!sourceBuffer) return;

            const rows = sectionsContainer.querySelectorAll('.section-row');
            statusEl.textContent = 'Processing sections...';
            processBtn.disabled = true;

            for (let i = 0; i < rows.length; i++) {
                const start = parseFloat(rows[i].querySelector('.start-time').value) || 0;
                const end = parseFloat(rows[i].querySelector('.end-time').value) || sourceBuffer.duration;
                
                if (end <= start) {
                    statusEl.textContent = `Section ${i + 1}: End must be after start.`;
                    processBtn.disabled = false;
                    return;
                }

                const startSample = Math.floor(start * sourceBuffer.sampleRate);
                const endSample = Math.floor(Math.min(end, sourceBuffer.duration) * sourceBuffer.sampleRate);
                const frameCount = endSample - startSample;

                const newBuffer = audioContext.createBuffer(
                    sourceBuffer.numberOfChannels,
                    frameCount,
                    sourceBuffer.sampleRate
                );

                for (let ch = 0; ch < sourceBuffer.numberOfChannels; ch++) {
                    const sourceData = sourceBuffer.getChannelData(ch);
                    const newData = newBuffer.getChannelData(ch);
                    for (let s = 0; s < frameCount; s++) {
                        newData[s] = sourceData[startSample + s];
                    }
                }

                const wavBlob = bufferToWav(newBuffer);
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `section_${i + 1}_${start.toFixed(2)}s-${end.toFixed(2)}s.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                await new Promise(r => setTimeout(r, 500));
            }

            statusEl.textContent = 'All sections saved.';
            processBtn.disabled = false;
        });

        function bufferToWav(buffer) {
            const numCh = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1;
            const bitsPerSample = 16;
            const bytesPerSample = bitsPerSample / 8;
            const blockAlign = numCh * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = buffer.length * blockAlign;
            const headerSize = 44;
            const arrayBuffer = new ArrayBuffer(headerSize + dataSize);
            const view = new DataView(arrayBuffer);

            function writeString(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numCh, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            let offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let ch = 0; ch < numCh; ch++) {
                    const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                    offset += 2;
                }
            }

            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
